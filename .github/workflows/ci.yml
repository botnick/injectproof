name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Provide safe test-time defaults so modules that enforce env at load
  # (auth.ts, config.ts) don't crash during typecheck / test.
  DATABASE_URL: file:./ci.db
  JWT_SECRET: ci-placeholder-jwt-secret-at-least-32-bytes-long-for-validation
  EVIDENCE_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  NEXT_PUBLIC_APP_NAME: InjectProof
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  # Puppeteer browser download is skipped in CI — our tests don't drive a
  # real browser; UI / bench runs it locally.
  PUPPETEER_SKIP_DOWNLOAD: '1'

jobs:
  lint-typecheck-test:
    name: "lint + typecheck + test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['20']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit + integration tests
        run: npm test

      - name: Upload coverage (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage/
          if-no-files-found: ignore

  bench-smoke:
    # Runs on Linux only (bench containers require docker — optional here).
    # Treated as informational: does not block merges.
    name: "bench smoke (informational)"
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run bench (unreachable targets → skipped; structure verified)
        run: npm run test:bench
      - name: Upload bench report
        uses: actions/upload-artifact@v4
        with:
          name: bench-report
          path: bench/reports/
          if-no-files-found: ignore

  sbom:
    name: "SBOM (informational)"
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
